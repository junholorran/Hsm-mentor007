<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSM ICT Mentor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #060810;
    --surface: #0d1117;
    --surface2: #161b22;
    --gold: #f0b429;
    --gold2: #ffd166;
    --green: #00ff88;
    --red: #ff4757;
    --blue: #00d4ff;
    --text: #e6edf3;
    --muted: #7d8590;
    --border: rgba(240,180,41,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(240,180,41,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: #000;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--gold); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* API KEY */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .api-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .api-input-wrap {
    display: flex;
    gap: 8px;
  }

  .api-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--gold); }

  .api-save {
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .api-save:hover { opacity: 0.85; }

  .api-status {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
  }

  .api-status.ok { color: var(--green); }
  .api-status.err { color: var(--red); }

  /* UPLOAD SECTION */
  .section-title {
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .upload-slot {
    background: var(--surface);
    border: 1px dashed rgba(240,180,41,0.3);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .upload-slot:hover {
    border-color: var(--gold);
    background: rgba(240,180,41,0.05);
  }

  .upload-slot.filled {
    border-style: solid;
    border-color: var(--gold);
  }

  .upload-slot.filled::after {
    content: '✓';
    position: absolute;
    top: 6px;
    right: 8px;
    color: var(--green);
    font-size: 12px;
    font-weight: 700;
  }

  .slot-tf {
    font-size: 16px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -0.5px;
  }

  .slot-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
  }

  .slot-icon { font-size: 20px; }

  .slot-preview {
    width: 100%;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 4px;
  }

  .upload-input { display: none; }

  /* PAIR SELECT */
  .pair-section {
    margin-bottom: 20px;
  }

  .pair-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .pair-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    transition: all 0.2s;
  }

  .pair-btn:hover, .pair-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(240,180,41,0.08);
  }

  /* ANALYZE BUTTON */
  .analyze-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    letter-spacing: -0.3px;
  }

  .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,180,41,0.3); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 32px;
  }

  .loading.show { display: block; }

  .loading-ring {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* RESULT */
  .result {
    display: none;
    animation: fadeUp 0.4s ease-out;
  }

  .result.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SCORE CARD */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .score-card.bull::before { background: linear-gradient(90deg, var(--green), transparent); }
  .score-card.bear::before { background: linear-gradient(90deg, var(--red), transparent); }
  .score-card.neutral::before { background: linear-gradient(90deg, var(--gold), transparent); }

  .score-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .score-direction {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .score-direction.bull { color: var(--green); }
  .score-direction.bear { color: var(--red); }
  .score-direction.neutral { color: var(--gold); }

  .score-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 700;
  }

  .score-badge.high { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .score-badge.mid { background: rgba(240,180,41,0.15); color: var(--gold); border: 1px solid rgba(240,180,41,0.3); }
  .score-badge.low { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }

  .score-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .score-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease-out;
  }

  .score-bar.bull { background: linear-gradient(90deg, var(--green), #00ff88aa); }
  .score-bar.bear { background: linear-gradient(90deg, var(--red), #ff475788); }
  .score-bar.neutral { background: linear-gradient(90deg, var(--gold), var(--gold2)); }

  /* TRADE BOX */
  .trade-box {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .trade-box-title {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .trade-levels {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .trade-level {
    text-align: center;
  }

  .trade-level-label {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .trade-level-value {
    font-size: 13px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
  }

  .entry-val { color: var(--blue); }
  .sl-val { color: var(--red); }
  .tp-val { color: var(--green); }

  /* ANALYSIS CONTENT */
  .analysis-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .analysis-card h3 {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .bias-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 4px;
  }

  .bias-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .bias-tf {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .bias-val {
    font-size: 13px;
    font-weight: 700;
  }

  .bias-val.bull { color: var(--green); }
  .bias-val.bear { color: var(--red); }
  .bias-val.neut { color: var(--gold); }

  .analysis-text {
    font-size: 13px;
    line-height: 1.7;
    color: #c9d1d9;
  }

  .analysis-text p { margin-bottom: 8px; }
  .analysis-text p:last-child { margin-bottom: 0; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    margin: 2px;
  }

  .tag-bull { background: rgba(0,255,136,0.1); color: var(--green); }
  .tag-bear { background: rgba(255,71,87,0.1); color: var(--red); }
  .tag-info { background: rgba(0,212,255,0.1); color: var(--blue); }
  .tag-warn { background: rgba(240,180,41,0.1); color: var(--gold); }

  /* RESET BTN */
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* FOOTER */
  .footer {
    text-align: center;
    padding-top: 24px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">H</div>
      <div class="logo-text">HSM <span>ICT</span> Mentor</div>
    </div>
    <div class="subtitle">Smart Money · Inner Circle Trader</div>
  </div>

  <!-- API KEY -->
  <div class="api-section">
    <div class="api-label">🔑 Gemini API Key</div>
    <div class="api-input-wrap">
      <input type="password" class="api-input" id="apiKey" placeholder="AIza... ou AQ.Ab8RN6...">
      <button class="api-save" onclick="saveKey()">Salvar</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- PAR -->
  <div class="pair-section">
    <div class="section-title">Par</div>
    <div class="pair-grid" id="pairGrid">
      <div class="pair-btn active" onclick="selectPair(this,'BTCUSD')">BTC</div>
      <div class="pair-btn" onclick="selectPair(this,'ETHUSD')">ETH</div>
      <div class="pair-btn" onclick="selectPair(this,'LINKUSD')">LINK</div>
      <div class="pair-btn" onclick="selectPair(this,'XLMUSD')">XLM</div>
      <div class="pair-btn" onclick="selectPair(this,'EURUSD')">EUR</div>
      <div class="pair-btn" onclick="selectPair(this,'GBPUSD')">GBP</div>
      <div class="pair-btn" onclick="selectPair(this,'NZDUSD')">NZD</div>
      <div class="pair-btn" onclick="selectPair(this,'USDCAD')">CAD</div>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="section-title">Gráficos</div>
  <div class="upload-grid">
    <div class="upload-slot" id="slot-D1" onclick="document.getElementById('inp-D1').click()">
      <div class="slot-icon">📅</div>
      <div class="slot-tf">D1</div>
      <div class="slot-label">Diário</div>
      <input type="file" class="upload-input" id="inp-D1" accept="image/*" onchange="handleFile(this,'D1')">
    </div>
    <div class="upload-slot" id="slot-H4" onclick="document.getElementById('inp-H4').click()">
      <div class="slot-icon">🕐</div>
      <div class="slot-tf">H4</div>
      <div class="slot-label">4 Horas</div>
      <input type="file" class="upload-input" id="inp-H4" accept="image/*" onchange="handleFile(this,'H4')">
    </div>
    <div class="upload-slot" id="slot-H1" onclick="document.getElementById('inp-H1').click()">
      <div class="slot-icon">⏰</div>
      <div class="slot-tf">H1</div>
      <div class="slot-label">1 Hora</div>
      <input type="file" class="upload-input" id="inp-H1" accept="image/*" onchange="handleFile(this,'H1')">
    </div>
    <div class="upload-slot" id="slot-M15" onclick="document.getElementById('inp-M15').click()">
      <div class="slot-icon">⚡</div>
      <div class="slot-tf">M15</div>
      <div class="slot-label">15 Min</div>
      <input type="file" class="upload-input" id="inp-M15" accept="image/*" onchange="handleFile(this,'M15')">
    </div>
    <div class="upload-slot" id="slot-M5" onclick="document.getElementById('inp-M5').click()">
      <div class="slot-icon">🎯</div>
      <div class="slot-tf">M5</div>
      <div class="slot-label">5 Min · Scalp</div>
      <input type="file" class="upload-input" id="inp-M5" accept="image/*" onchange="handleFile(this,'M5')">
    </div>
    <div class="upload-slot" id="slot-M1" onclick="document.getElementById('inp-M1').click()">
      <div class="slot-icon">🔬</div>
      <div class="slot-tf">M1</div>
      <div class="slot-label">1 Min · Opcional</div>
      <input type="file" class="upload-input" id="inp-M1" accept="image/*" onchange="handleFile(this,'M1')">
    </div>
  </div>

  <!-- ANALYZE -->
  <button class="analyze-btn" onclick="analyze()" id="analyzeBtn">
    ⚡ Analisar Agora
  </button>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">Analisando com ICT/SMC...</div>
  </div>

  <!-- RESULT -->
  <div class="result" id="result"></div>

  <div class="footer">HSM Inner Circle Trader · v2.0</div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedPair = 'BTCUSD';
let images = {};
let apiKey = localStorage.getItem('gemini_key') || '';

// Init
window.onload = () => {
  if(apiKey) {
    document.getElementById('apiKey').value = apiKey;
    document.getElementById('apiStatus').textContent = '✓ Chave guardada';
    document.getElementById('apiStatus').className = 'api-status ok';
  }
};

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if(!k) return showToast('❌ Insere a API key');
  apiKey = k;
  localStorage.setItem('gemini_key', k);
  document.getElementById('apiStatus').textContent = '✓ Chave guardada com sucesso';
  document.getElementById('apiStatus').className = 'api-status ok';
  showToast('✅ API Key guardada!');
}

function selectPair(el, pair) {
  document.querySelectorAll('.pair-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedPair = pair;
}

function handleFile(input, tf) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result.split(',')[1];
    images[tf] = { base64, mimeType: file.type };
    const slot = document.getElementById('slot-' + tf);
    slot.classList.add('filled');
    slot.innerHTML = `
      <img src="${e.target.result}" class="slot-preview">
      <div class="slot-tf">${tf}</div>
      <input type="file" class="upload-input" id="inp-${tf}" accept="image/*" onchange="handleFile(this,'${tf}')">
    `;
  };
  reader.readAsDataURL(file);
}

async function analyze() {
  if(!apiKey) return showToast('❌ Guarda a API Key primeiro');
  const tfList = Object.keys(images);
  if(tfList.length < 2) return showToast('❌ Carrega pelo menos 2 gráficos');

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').innerHTML = '';

  const parts = [];

  parts.push({
    text: `És um mentor profissional de trading especializado em ICT (Inner Circle Trader) e SMC (Smart Money Concepts). 
    
Analisa os gráficos do ${selectedPair} que te envio e faz uma análise COMPLETA e DETALHADA em português de Portugal/Brasil.

ANALISA OBRIGATORIAMENTE:

1. BIAS por timeframe (${tfList.join(', ')}):
   - Bullish, Bearish ou Neutro
   - PDH/PDL tocados
   - Estrutura de mercado (HH/HL ou LH/LL)

2. LIQUIDEZ:
   - BSL (Buy Side Liquidity) - onde estão os highs a ser targetados
   - SSL (Sell Side Liquidity) - onde estão os lows a ser targetados
   - Equal Highs/Lows
   - Session Highs/Lows

3. SMART MONEY CONCEPTS:
   - FVGs (Fair Value Gaps) - bullish e bearish, com zonas de preço
   - Order Blocks - última vela institucional
   - Breaker Blocks se existirem
   - IFVG se existir

4. ESTRUTURA:
   - CHoCH (Change of Character) - houve ou não
   - BOS (Break of Structure)
   - Displacement (vela de impulso forte)
   - Sweep de liquidez confirmado

5. ZONAS:
   - Premium vs Discount (acima/abaixo de 50% do range)
   - OTE (Optimal Trade Entry 62-79%)
   - Onde o preço está agora relativo ao equilíbrio

6. AMD + KILLZONES:
   - Fase atual (Accumulation/Manipulation/Distribution)
   - Killzone atual (Asia/London/NY)

7. SETUP SWING (D1/H4/H1):
   - Direção: BUY ou SELL
   - Entrada exata em preço
   - Stop Loss estrutural
   - TP1, TP2, TP3
   - Risk/Reward ratio
   - Confluências (lista de 3-5 confluências)

8. SETUP SCALP (M15/M5):
   - Direção: BUY ou SELL (ou aguardar)
   - Entrada exata
   - SL em pips pequeno
   - TP rápido
   - Confluências

9. SCORE DE CONFLUÊNCIA (0-100):
   - Quantos fatores confluem
   - Qualidade do setup
   - ENTRA ou AGUARDA

10. CONCLUSÃO FINAL:
    - Decisão clara: COMPRA / VENDA / AGUARDA
    - Resumo em 2-3 linhas do porquê
    - Próximo nível de liquidez alvo

Responde em formato estruturado e claro. Sê DIRETO e OBJETIVO. Não tenhas medo de dizer "não entres" se o setup não for válido.

Gráficos enviados: ${tfList.join(', ')} do ${selectedPair}`
  });

  // Add images
  for(const tf of tfList) {
    parts.push({ text: `\nGráfico ${tf}:` });
    parts.push({
      inline_data: {
        mime_type: images[tf].mimeType,
        data: images[tf].base64
      }
    });
  }

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts }],
          generationConfig: { temperature: 0.3, maxOutputTokens: 3000 }
        })
      }
    );

    const data = await res.json();

    if(data.error) throw new Error(data.error.message);

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if(!text) throw new Error('Sem resposta da IA');

    renderResult(text);

  } catch(e) {
    showToast('❌ Erro: ' + e.message);
    console.error(e);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

function renderResult(text) {
  // Detect direction
  const textLow = text.toLowerCase();
  let dir = 'neutral';
  let dirText = '⚠️ AGUARDA';
  let scoreClass = 'mid';

  if(textLow.includes('compra') || textLow.includes('bullish') || textLow.includes('buy') || textLow.includes('long')) {
    const sellCount = (textLow.match(/vend[ae]|bearish|sell|short/g) || []).length;
    const buyCount = (textLow.match(/compra|bullish|buy|long/g) || []).length;
    if(buyCount > sellCount) { dir = 'bull'; dirText = '📈 COMPRA'; scoreClass = 'high'; }
    else { dir = 'bear'; dirText = '📉 VENDA'; scoreClass = 'high'; }
  } else if(textLow.includes('venda') || textLow.includes('bearish') || textLow.includes('sell') || textLow.includes('short')) {
    dir = 'bear'; dirText = '📉 VENDA'; scoreClass = 'high';
  }

  // Extract score
  const scoreMatch = text.match(/(\d{1,3})\s*\/\s*100/);
  const score = scoreMatch ? parseInt(scoreMatch[1]) : 50;
  if(score >= 70) scoreClass = 'high';
  else if(score >= 50) scoreClass = 'mid';
  else scoreClass = 'low';

  // Format text into sections
  const formatted = formatAnalysis(text);

  const html = `
    <div class="score-card ${dir}">
      <div class="score-header">
        <div class="score-direction ${dir}">${dirText}</div>
        <div class="score-badge ${scoreClass}">${score}/100</div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar ${dir}" style="width:${score}%"></div>
      </div>
      <div style="font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;">${selectedPair} · Análise ICT/SMC Completa</div>
    </div>

    <div class="analysis-card">
      <h3>📊 Análise Completa</h3>
      <div class="analysis-text">${formatted}</div>
    </div>

    <button class="reset-btn" onclick="resetAnalysis()">🔄 Nova Análise</button>
  `;

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = html;
  resultEl.classList.add('show');
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function formatAnalysis(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--gold)">$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/#{1,3}\s(.+)/g, '<strong style="color:var(--gold);font-size:13px;display:block;margin:12px 0 6px;font-family:\'Space Mono\',monospace;text-transform:uppercase;letter-spacing:1px">$1</strong>')
    .replace(/BULLISH|BULLISH/g, '<span class="tag tag-bull">BULLISH</span>')
    .replace(/BEARISH|BEARISH/g, '<span class="tag tag-bear">BEARISH</span>')
    .replace(/\bFVG\b/g, '<span class="tag tag-info">FVG</span>')
    .replace(/\bOB\b/g, '<span class="tag tag-info">OB</span>')
    .replace(/\bCHoCH\b/g, '<span class="tag tag-warn">CHoCH</span>')
    .replace(/\bBOS\b/g, '<span class="tag tag-info">BOS</span>')
    .replace(/\bSWEEP\b/gi, '<span class="tag tag-warn">SWEEP</span>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

function resetAnalysis() {
  images = {};
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').innerHTML = '';
  ['D1','H4','H1','M15','M5','M1'].forEach(tf => {
    const slot = document.getElementById('slot-' + tf);
    const labels = { D1:'📅', H4:'🕐', H1:'⏰', M15:'⚡', M5:'🎯', M1:'🔬' };
    const names = { D1:'Diário', H4:'4 Horas', H1:'1 Hora', M15:'15 Min', M5:'5 Min · Scalp', M1:'1 Min · Opcional' };
    slot.classList.remove('filled');
    slot.innerHTML = `
      <div class="slot-icon">${labels[tf]}</div>
      <div class="slot-tf">${tf}</div>
      <div class="slot-label">${names[tf]}</div>
      <input type="file" class="upload-input" id="inp-${tf}" accept="image/*" onchange="handleFile(this,'${tf}')">
    `;
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
